<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Задачник">
<meta name="theme-color" content="#0A0A0A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ROOFFORMAT — Задачник</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;--bg2:#141414;--bg3:#1A1A1A;--bg4:#202020;
  --border:#222;--border2:#2A2A2A;
  --text:#E8E0D0;--muted:#555;--muted2:#888;
  --gold:#C8A96E;--green:#7EB8A4;--purple:#A07EB8;--red:#E07E7E;--blue:#7EA8C8;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --mono:'Space Mono',monospace;
  --serif:'Crimson Pro',Georgia,serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--serif);min-height:100vh;max-width:430px;margin:0 auto;display:flex;flex-direction:column;padding-top:var(--safe-top)}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}

/* HEADER */
.header{padding:18px 20px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-end}
.hbrand{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--gold);margin-bottom:3px}
.htitle{font-size:22px;font-weight:300;letter-spacing:-.02em}
.hstats{text-align:right;font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.9}
.htoday{color:var(--gold)}

/* NAV */
.nav{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:11px 14px;background:none;border:none;color:var(--muted);font-size:10px;letter-spacing:.07em;font-family:var(--mono);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* VIEWS */
.view{display:none;flex:1;flex-direction:column;overflow:hidden}
.view.active{display:flex}

/* FILTERS */
.filters{display:flex;gap:7px;padding:11px 16px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fbtn{white-space:nowrap;padding:5px 13px;border-radius:20px;background:var(--bg3);color:var(--muted);border:1px solid var(--border2);font-size:10px;font-family:var(--mono);transition:all .15s}
.fbtn.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}

/* TASK LIST */
.task-list{flex:1;overflow-y:auto;padding:0 16px 80px}
.empty{text-align:center;color:#2A2A2A;padding:60px 0;font-size:15px;font-style:italic}

.task-item{padding:13px 0;border-bottom:1px solid #111;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.task-row{display:flex;gap:11px;align-items:flex-start}

.check{width:22px;height:22px;border-radius:50%;flex-shrink:0;margin-top:2px;border:1.5px solid var(--border2);background:none;display:flex;align-items:center;justify-content:center;transition:all .2s}
.check.done{background:var(--gold);border-color:var(--gold)}
.check.done::after{content:'✓';color:var(--bg);font-size:11px;font-weight:700}

.task-body{flex:1;min-width:0}
.task-title{font-size:15px;line-height:1.4;color:var(--text)}
.task-title.done{color:#333;text-decoration:line-through}
.task-meta{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;align-items:center}
.tag{font-size:10px;font-family:var(--mono)}

.task-del{background:none;border:none;color:#2A2A2A;font-size:18px;padding:0 4px;flex-shrink:0;transition:color .15s}
.task-del:hover{color:var(--red)}

/* EXPAND */
.task-expand-btn{background:none;border:none;color:var(--muted);font-size:10px;font-family:var(--mono);padding:5px 0 0;letter-spacing:.05em}
.task-details{margin-top:10px;padding:10px 12px;background:var(--bg2);border-radius:8px;display:none}
.task-details.open{display:block}

/* SUBTASKS */
.subtask-list{margin-bottom:8px}
.subtask-item{display:flex;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid #1A1A1A}
.subtask-item:last-child{border-bottom:none}
.sub-check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border2);background:none;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.sub-check.done{background:var(--gold);border-color:var(--gold)}
.sub-check.done::after{content:'✓';color:var(--bg);font-size:8px;font-weight:700}
.sub-title{flex:1;font-size:13px;color:var(--muted2)}
.sub-title.done{text-decoration:line-through;color:#333}
.sub-del{background:none;border:none;color:#2A2A2A;font-size:14px;padding:0 3px}

.add-sub-row{display:flex;gap:6px;margin-top:6px}
.sub-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:6px 10px;font-size:13px;font-family:var(--serif);outline:none}
.sub-add-btn{background:var(--border2);border:none;border-radius:6px;color:var(--gold);padding:6px 10px;font-size:13px}

/* NOTES */
.task-note{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:8px 10px;font-size:13px;font-family:var(--serif);outline:none;resize:none;margin-top:6px}
.task-note:focus{border-color:var(--gold)}

/* TAGS */
.tag-input-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center}
.task-tag-chip{font-size:10px;font-family:var(--mono);color:var(--blue);border:1px solid var(--blue);border-radius:12px;padding:2px 8px;display:inline-flex;align-items:center;gap:4px}
.task-tag-chip button{background:none;border:none;color:var(--blue);font-size:11px;padding:0}
.tag-inp{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:5px 9px;font-size:12px;font-family:var(--mono);outline:none;width:100px}

/* ADD FORM */
.add-form{padding:20px;display:flex;flex-direction:column;gap:18px;overflow-y:auto;padding-bottom:calc(20px + var(--safe-bottom))}
.flabel{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.12em;display:block;margin-bottom:7px}
textarea,input[type=date],input[type=text]{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:11px 13px;font-size:15px;font-family:var(--serif);outline:none;transition:border-color .2s;-webkit-appearance:none}
textarea:focus,input:focus{border-color:var(--gold)}
textarea{resize:none}
.chip-row{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:20px;background:var(--bg3);color:var(--muted);border:1px solid var(--border2);font-size:11px;font-family:var(--mono);transition:all .15s}
.prio-row{display:flex;gap:8px}
.prio-chip{flex:1;padding:8px 4px;border-radius:10px;background:var(--bg3);color:var(--muted);border:1px solid var(--border2);font-size:10px;font-family:var(--mono);text-align:center;transition:all .15s}
.btn-add{background:var(--gold);border:none;border-radius:12px;padding:14px;color:var(--bg);font-size:13px;font-weight:700;font-family:var(--mono);letter-spacing:.06em;transition:opacity .15s}
.btn-add:active{opacity:.8}

/* OBJECTS VIEW */
.obj-list{flex:1;overflow-y:auto;padding:12px 16px 80px}
.obj-card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:10px;animation:fadeIn .2s ease}
.obj-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.obj-name{font-size:16px;font-weight:400}
.obj-status{font-size:10px;font-family:var(--mono);padding:3px 9px;border-radius:10px}
.obj-meta{font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:8px}
.obj-progress{height:3px;background:var(--border2);border-radius:2px;margin-bottom:10px}
.obj-progress-bar{height:100%;border-radius:2px;background:var(--gold);transition:width .3s}
.obj-actions{display:flex;gap:8px}
.obj-btn{flex:1;padding:7px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--muted2);font-size:10px;font-family:var(--mono)}
.obj-btn.primary{background:var(--gold);color:var(--bg);border-color:var(--gold)}

.add-obj-form{padding:16px;border-top:1px solid var(--border)}

/* WEEK VIEW */
.week-header{display:flex;padding:10px 16px;gap:4px;border-bottom:1px solid var(--border)}
.week-day{flex:1;text-align:center;font-family:var(--mono);font-size:9px;color:var(--muted);padding:5px 2px;border-radius:8px;cursor:pointer;transition:all .15s}
.week-day.today{color:var(--gold)}
.week-day.selected{background:var(--gold);color:var(--bg)}
.week-day .day-num{font-size:16px;font-weight:300;display:block;margin-bottom:1px}
.week-day .day-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);margin:2px auto 0;opacity:0}
.week-day .day-dot.has{opacity:1}

.time-blocks{flex:1;overflow-y:auto;padding:12px 16px 80px}
.time-block{margin-bottom:16px}
.block-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.block-task{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid #111}
.block-task:last-child{border-bottom:none}
.block-empty{font-size:13px;color:#2A2A2A;font-style:italic;padding:8px 0}

/* AI CHAT */
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:86%;padding:11px 14px;font-size:14px;line-height:1.5;font-family:var(--serif);animation:fadeIn .2s ease}
.msg.user{align-self:flex-end;background:var(--gold);color:var(--bg);border-radius:16px 16px 4px 16px}
.msg.ai{align-self:flex-start;background:var(--bg3);color:var(--text);border-radius:16px 16px 16px 4px}
.msg.typing{color:var(--gold);font-style:italic;font-size:13px;align-self:flex-start}
.chat-input-row{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;padding-bottom:calc(12px + var(--safe-bottom))}
.chat-input{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:10px 13px;font-size:14px;font-family:var(--serif);outline:none;transition:border-color .2s}
.chat-input:focus{border-color:var(--gold)}
.chat-send{background:var(--gold);border:none;border-radius:10px;padding:10px 16px;color:var(--bg);font-size:16px}

/* OFFLINE */
.offline-banner{background:#2A1A0A;border-bottom:1px solid #4A3010;padding:7px 16px;font-size:10px;font-family:var(--mono);color:var(--gold);text-align:center;display:none}
.offline-banner.show{display:block}

.nav-safe{height:var(--safe-bottom);background:var(--bg)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:85vh;overflow-y:auto;padding-bottom:calc(20px + var(--safe-bottom))}
.modal-title{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:.1em;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;color:var(--muted);font-size:20px}
</style>
</head>
<body>

<div class="offline-banner" id="offlineBanner">⚡ Офлайн — задачи сохраняются локально</div>

<div class="header">
  <div>
    <div class="hbrand">ROOFFORMAT</div>
    <div class="htitle">Задачник</div>
  </div>
  <div class="hstats">
    <div class="htoday" id="statToday"></div>
    <div id="statActive"></div>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" data-view="tasks" onclick="switchView('tasks')">ЗАДАЧИ</button>
  <button class="nav-btn" data-view="week" onclick="switchView('week')">НЕДЕЛЯ</button>
  <button class="nav-btn" data-view="objects" onclick="switchView('objects')">ОБЪЕКТЫ</button>
  <button class="nav-btn" data-view="add" onclick="switchView('add')">+ ДОБАВИТЬ</button>
  <button class="nav-btn" data-view="ai" onclick="switchView('ai')">ИИ</button>
</nav>

<!-- TASKS -->
<div class="view active" id="view-tasks">
  <div class="filters" id="filters"></div>
  <div class="task-list" id="taskList"></div>
</div>

<!-- WEEK -->
<div class="view" id="view-week">
  <div class="week-header" id="weekHeader"></div>
  <div class="time-blocks" id="timeBlocks"></div>
</div>

<!-- OBJECTS -->
<div class="view" id="view-objects">
  <div class="obj-list" id="objList"></div>
  <div class="add-obj-form">
    <div style="display:flex;gap:8px">
      <input type="text" id="newObjName" placeholder="Название объекта..." style="flex:1;font-size:14px;padding:10px 13px">
      <button class="btn-add" style="padding:10px 16px;border-radius:10px" onclick="addObject()">+</button>
    </div>
  </div>
</div>

<!-- ADD -->
<div class="view" id="view-add">
  <div class="add-form">
    <div>
      <label class="flabel">ЗАДАЧА</label>
      <textarea id="newTitle" rows="3" placeholder="Что нужно сделать?"></textarea>
    </div>
    <div>
      <label class="flabel">ЗАМЕТКА (необязательно)</label>
      <textarea id="newNote" rows="2" placeholder="Дополнительная информация..."></textarea>
    </div>
    <div>
      <label class="flabel">ТЕГИ</label>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap" id="newTagsDisplay"></div>
      <div style="display:flex;gap:6px;margin-top:6px">
        <input type="text" id="newTagInput" placeholder="Добавить тег..." style="font-size:13px;padding:7px 11px;width:140px">
        <button class="sub-add-btn" onclick="addNewTag()">+ тег</button>
      </div>
    </div>
    <div>
      <label class="flabel">ПРОЕКТ</label>
      <div class="chip-row" id="projectChips"></div>
    </div>
    <div>
      <label class="flabel">ПРИОРИТЕТ</label>
      <div class="prio-row" id="prioChips"></div>
    </div>
    <div>
      <label class="flabel">БЛОК ДНЯ</label>
      <div class="chip-row" id="blockChips"></div>
    </div>
    <div>
      <label class="flabel">ДАТА</label>
      <input type="date" id="newDate">
    </div>
    <button class="btn-add" onclick="submitTask()">ДОБАВИТЬ ЗАДАЧУ</button>
  </div>
</div>

<!-- AI -->
<div class="view" id="view-ai">
  <div class="chat-messages" id="chatMessages">
    <div class="msg ai">Привет, Даниил. Пиши задачи или вопросы — добавлю в список или помогу разобраться с приоритетами.</div>
  </div>
  <div class="chat-input-row">
    <input class="chat-input" id="chatInput" type="text" placeholder="Напиши задачу или вопрос..." onkeydown="if(event.key==='Enter')sendChat()">
    <button class="chat-send" onclick="sendChat()">→</button>
  </div>
</div>

<div class="nav-safe"></div>

<!-- TASK DETAIL MODAL -->
<div class="modal-overlay" id="taskModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="modal-title">ЗАДАЧА</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const STORAGE_KEY='rf_tasks_v3';
const OBJ_KEY='rf_objects_v1';

const PROJECTS=[
  {id:'roofformat',label:'ROOFFORMAT',color:'#C8A96E'},
  {id:'personal',label:'Личное',color:'#7EB8A4'},
  {id:'stroika',label:'Стройка',color:'#A07EB8'},
  {id:'content',label:'Контент',color:'#E07E7E'},
];
const PRIORITIES=[
  {id:'high',label:'Важно',color:'#E07E7E'},
  {id:'medium',label:'Средне',color:'#C8A96E'},
  {id:'low',label:'Спокойно',color:'#7EB8A4'},
];
const BLOCKS=[
  {id:'morning',label:'☀️ Утро'},
  {id:'day',label:'🌤 День'},
  {id:'evening',label:'🌙 Вечер'},
  {id:'any',label:'📌 Любое'},
];
const OBJ_STATUSES=[
  {id:'active',label:'В работе',color:'#C8A96E'},
  {id:'design',label:'Проект',color:'#7EA8C8'},
  {id:'done',label:'Сдан',color:'#7EB8A4'},
  {id:'paused',label:'Пауза',color:'#555'},
];

let tasks=[], objects=[], currentFilter='all', selectedWeekDay=null;
let newProject='roofformat', newPriority='medium', newBlock='any', newTags=[];
let editingTaskId=null;

// Storage
function loadData(){
  try{tasks=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch{tasks=[]}
  try{objects=JSON.parse(localStorage.getItem(OBJ_KEY)||'[]')}catch{objects=[]}
}
function saveData(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(tasks));
  localStorage.setItem(OBJ_KEY,JSON.stringify(objects));
}

// Helpers
function fmtDate(s){
  if(!s)return'';
  const d=new Date(s+'T00:00:00');
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function today(){return new Date().toISOString().split('T')[0]}
function getWeekDays(){
  const d=new Date(); d.setHours(0,0,0,0);
  const mon=new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7));
  return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x});
}
const DAY_NAMES=['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];

// Stats
function renderStats(){
  const t=today();
  const todayN=tasks.filter(x=>x.date===t&&!x.done).length;
  const active=tasks.filter(x=>!x.done).length;
  document.getElementById('statToday').textContent=todayN>0?todayN+' на сегодня':'';
  document.getElementById('statActive').textContent=active+' активных';
}

// TASKS VIEW
function renderFilters(){
  const all=[{id:'all',label:'Все'},{id:'done',label:'Готово'},...PROJECTS.map(p=>({id:p.id,label:p.label}))];
  document.getElementById('filters').innerHTML=all.map(f=>
    `<button class="fbtn${currentFilter===f.id?' active':''}" onclick="setFilter('${f.id}')">${f.label}</button>`
  ).join('');
}

function renderTasks(){
  const filtered=tasks.filter(t=>{
    if(currentFilter==='all')return!t.done;
    if(currentFilter==='done')return t.done;
    return t.project===currentFilter&&!t.done;
  });
  if(!filtered.length){
    document.getElementById('taskList').innerHTML=`<div class="empty">${currentFilter==='done'?'Ещё ничего не выполнено':'Задач нет — добавь первую'}</div>`;
    return;
  }
  document.getElementById('taskList').innerHTML=filtered.map(t=>taskHTML(t)).join('');
}

function taskHTML(t){
  const proj=PROJECTS.find(p=>p.id===t.project);
  const prio=PRIORITIES.find(p=>p.id===t.priority);
  const subDone=(t.subtasks||[]).filter(s=>s.done).length;
  const subTotal=(t.subtasks||[]).length;
  const subStr=subTotal>0?`<span class="tag" style="color:var(--muted)">${subDone}/${subTotal} подзадач</span>`:'';
  const tagsStr=(t.tags||[]).map(tag=>`<span class="tag" style="color:var(--blue);border:1px solid #1E3A4A;border-radius:10px;padding:1px 7px">#${esc(tag)}</span>`).join('');
  const dateStr=t.date?`<span class="tag" style="color:var(--muted)">${fmtDate(t.date)}</span>`:'';
  const blockStr=t.block&&t.block!=='any'?`<span class="tag" style="color:var(--muted)">${BLOCKS.find(b=>b.id===t.block)?.label||''}</span>`:'';
  const notePreview=t.note?`<div style="font-size:12px;color:var(--muted);margin-top:4px;font-style:italic">${esc(t.note.substring(0,60))}${t.note.length>60?'…':''}</div>`:'';

  return`<div class="task-item" id="task-${t.id}">
    <div class="task-row">
      <button class="check${t.done?' done':''}" onclick="toggleDone(${t.id})"></button>
      <div class="task-body" onclick="openTask(${t.id})" style="cursor:pointer">
        <div class="task-title${t.done?' done':''}">${esc(t.title)}</div>
        ${notePreview}
        <div class="task-meta">
          ${proj?`<span class="tag" style="color:${proj.color}">${proj.label}</span>`:''}
          ${prio?`<span class="tag" style="color:${prio.color}">${prio.label}</span>`:''}
          ${dateStr}${blockStr}${subStr}${tagsStr}
        </div>
      </div>
      <button class="task-del" onclick="deleteTask(${t.id})">×</button>
    </div>
  </div>`;
}

// TASK MODAL
function openTask(id){
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  editingTaskId=id;
  const proj=PROJECTS.find(p=>p.id===t.project);
  const prio=PRIORITIES.find(p=>p.id===t.priority);

  document.getElementById('modalContent').innerHTML=`
    <div style="font-size:18px;font-weight:400;margin-bottom:12px">${esc(t.title)}</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      ${proj?`<span class="tag" style="color:${proj.color};border:1px solid ${proj.color};border-radius:12px;padding:3px 10px">${proj.label}</span>`:''}
      ${prio?`<span class="tag" style="color:${prio.color};border:1px solid ${prio.color};border-radius:12px;padding:3px 10px">${prio.label}</span>`:''}
      ${t.date?`<span class="tag" style="color:var(--muted);border:1px solid var(--border2);border-radius:12px;padding:3px 10px">${fmtDate(t.date)}</span>`:''}
    </div>

    <div class="flabel">ЗАМЕТКА</div>
    <textarea class="task-note" rows="3" id="modalNote" onchange="saveTaskNote(${id})">${esc(t.note||'')}</textarea>

    <div class="flabel" style="margin-top:14px">ТЕГИ</div>
    <div id="modalTags" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">${(t.tags||[]).map((tag,i)=>`<span class="task-tag-chip">#${esc(tag)}<button onclick="removeTag(${id},${i})">×</button></span>`).join('')}</div>
    <div style="display:flex;gap:6px">
      <input class="tag-inp" id="modalTagInput" placeholder="#тег" onkeydown="if(event.key==='Enter')addModalTag(${id})">
      <button class="sub-add-btn" onclick="addModalTag(${id})">+ тег</button>
    </div>

    <div class="flabel" style="margin-top:14px">ПОДЗАДАЧИ</div>
    <div class="subtask-list" id="subtaskList">${renderSubtasks(t)}</div>
    <div class="add-sub-row">
      <input class="sub-input" id="subInput" placeholder="Новая подзадача..." onkeydown="if(event.key==='Enter')addSubtask(${id})">
      <button class="sub-add-btn" onclick="addSubtask(${id})">+</button>
    </div>
  `;
  document.getElementById('taskModal').classList.add('open');
}

function renderSubtasks(t){
  return(t.subtasks||[]).map((s,i)=>`
    <div class="subtask-item">
      <button class="sub-check${s.done?' done':''}" onclick="toggleSub(${t.id},${i})"></button>
      <span class="sub-title${s.done?' done':''}">${esc(s.title)}</span>
      <button class="sub-del" onclick="deleteSub(${t.id},${i})">×</button>
    </div>`).join('')||'<div style="font-size:12px;color:#333;font-style:italic;padding:4px 0">Подзадач нет</div>';
}

function closeModal(){document.getElementById('taskModal').classList.remove('open');editingTaskId=null}

function saveTaskNote(id){
  tasks=tasks.map(t=>t.id===id?{...t,note:document.getElementById('modalNote').value}:t);
  saveData();renderTasks();
}

function addSubtask(id){
  const inp=document.getElementById('subInput');
  const title=inp.value.trim();if(!title)return;
  tasks=tasks.map(t=>{
    if(t.id!==id)return t;
    return{...t,subtasks:[...(t.subtasks||[]),{title,done:false}]};
  });
  inp.value='';saveData();
  const t=tasks.find(x=>x.id===id);
  document.getElementById('subtaskList').innerHTML=renderSubtasks(t);
  renderTasks();
}

function toggleSub(taskId,subIdx){
  tasks=tasks.map(t=>{
    if(t.id!==taskId)return t;
    const subs=[...(t.subtasks||[])];
    subs[subIdx]={...subs[subIdx],done:!subs[subIdx].done};
    return{...t,subtasks:subs};
  });
  saveData();
  const t=tasks.find(x=>x.id===taskId);
  document.getElementById('subtaskList').innerHTML=renderSubtasks(t);
  renderTasks();
}

function deleteSub(taskId,subIdx){
  tasks=tasks.map(t=>{
    if(t.id!==taskId)return t;
    const subs=[...(t.subtasks||[])];subs.splice(subIdx,1);
    return{...t,subtasks:subs};
  });
  saveData();
  const t=tasks.find(x=>x.id===taskId);
  document.getElementById('subtaskList').innerHTML=renderSubtasks(t);
  renderTasks();
}

function addModalTag(id){
  const inp=document.getElementById('modalTagInput');
  const tag=inp.value.trim().replace(/^#/,'');if(!tag)return;
  tasks=tasks.map(t=>t.id===id?{...t,tags:[...(t.tags||[]),tag]}:t);
  inp.value='';saveData();
  const t=tasks.find(x=>x.id===id);
  document.getElementById('modalTags').innerHTML=(t.tags||[]).map((tg,i)=>`<span class="task-tag-chip">#${esc(tg)}<button onclick="removeTag(${id},${i})">×</button></span>`).join('');
  renderTasks();
}

function removeTag(id,idx){
  tasks=tasks.map(t=>{
    if(t.id!==id)return t;
    const tags=[...(t.tags||[])];tags.splice(idx,1);return{...t,tags};
  });
  saveData();
  const t=tasks.find(x=>x.id===id);
  document.getElementById('modalTags').innerHTML=(t.tags||[]).map((tg,i)=>`<span class="task-tag-chip">#${esc(tg)}<button onclick="removeTag(${id},${i})">×</button></span>`).join('');
  renderTasks();
}

// WEEK VIEW
function renderWeek(){
  const days=getWeekDays();
  const sel=selectedWeekDay||today();
  document.getElementById('weekHeader').innerHTML=days.map((d,i)=>{
    const ds=d.toISOString().split('T')[0];
    const hasTasks=tasks.some(t=>t.date===ds&&!t.done);
    const isToday=ds===today();
    const isSel=ds===sel;
    return`<div class="week-day${isToday?' today':''}${isSel?' selected':''}" onclick="selectDay('${ds}')">
      <span style="font-size:9px">${DAY_NAMES[i]}</span>
      <span class="day-num">${d.getDate()}</span>
      <div class="day-dot${hasTasks?' has':''}"></div>
    </div>`;
  }).join('');
  renderTimeBlocks(sel);
}

function selectDay(ds){selectedWeekDay=ds;renderWeek()}

function renderTimeBlocks(ds){
  const dayTasks=tasks.filter(t=>t.date===ds&&!t.done);
  const noDate=tasks.filter(t=>!t.date&&!t.done);
  const blocks=[
    {id:'morning',label:'☀️ УТРО'},
    {id:'day',label:'🌤 ДЕНЬ'},
    {id:'evening',label:'🌙 ВЕЧЕР'},
    {id:'any',label:'📌 ОСТАЛЬНЫЕ'},
  ];
  document.getElementById('timeBlocks').innerHTML=blocks.map(b=>{
    const bTasks=b.id==='any'
      ?[...dayTasks.filter(t=>!t.block||t.block==='any'),...(ds===today()?noDate:[])]
      :dayTasks.filter(t=>t.block===b.id);
    return`<div class="time-block">
      <div class="block-label">${b.label}</div>
      ${bTasks.length?bTasks.map(t=>`
        <div class="block-task">
          <button class="check${t.done?' done':''}" onclick="toggleDone(${t.id});renderWeek()" style="width:18px;height:18px;flex-shrink:0;margin-top:2px"></button>
          <div style="flex:1;min-width:0;cursor:pointer" onclick="openTask(${t.id})">
            <div style="font-size:14px">${esc(t.title)}</div>
            ${(t.subtasks||[]).length?`<div style="font-size:11px;color:var(--muted);font-family:var(--mono)">${t.subtasks.filter(s=>s.done).length}/${t.subtasks.length} подзадач</div>`:''}
          </div>
        </div>`).join(''):`<div class="block-empty">Нет задач</div>`}
    </div>`;
  }).join('');
}

// OBJECTS
function renderObjects(){
  if(!objects.length){
    document.getElementById('objList').innerHTML='<div class="empty">Объектов нет — добавь первый</div>';
    return;
  }
  document.getElementById('objList').innerHTML=objects.map(o=>{
    const status=OBJ_STATUSES.find(s=>s.id===o.status)||OBJ_STATUSES[0];
    const objTasks=tasks.filter(t=>t.project==='roofformat'&&t.objId===o.id);
    const done=objTasks.filter(t=>t.done).length;
    const total=objTasks.length;
    const pct=total?Math.round(done/total*100):0;
    return`<div class="obj-card">
      <div class="obj-header">
        <div class="obj-name">${esc(o.name)}</div>
        <span class="obj-status" style="background:${status.color}22;color:${status.color}">${status.label}</span>
      </div>
      ${o.address?`<div class="obj-meta">📍 ${esc(o.address)}</div>`:''}
      ${total?`<div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:6px">${done}/${total} задач</div>
      <div class="obj-progress"><div class="obj-progress-bar" style="width:${pct}%"></div></div>`:''}
      <div class="obj-actions">
        <select class="obj-btn" onchange="changeObjStatus(${o.id},this.value)" style="font-family:var(--mono);font-size:10px;background:var(--bg3)">
          ${OBJ_STATUSES.map(s=>`<option value="${s.id}"${o.status===s.id?' selected':''}>${s.label}</option>`).join('')}
        </select>
        <button class="obj-btn" onclick="addObjTask(${o.id})">+ задача</button>
        <button class="obj-btn" onclick="deleteObj(${o.id})" style="color:var(--red);flex:0;padding:7px 10px">×</button>
      </div>
    </div>`;
  }).join('');
}

function addObject(){
  const inp=document.getElementById('newObjName');
  const name=inp.value.trim();if(!name)return;
  objects.push({id:Date.now(),name,address:'',status:'active'});
  inp.value='';saveData();renderObjects();
}

function changeObjStatus(id,status){
  objects=objects.map(o=>o.id===id?{...o,status}:o);
  saveData();renderObjects();
}

function deleteObj(id){
  if(!confirm('Удалить объект?'))return;
  objects=objects.filter(o=>o.id!==id);
  saveData();renderObjects();
}

function addObjTask(objId){
  const obj=objects.find(o=>o.id===objId);if(!obj)return;
  const title=prompt(`Задача для объекта «${obj.name}»:`);
  if(!title||!title.trim())return;
  tasks.unshift({id:Date.now(),title:title.trim(),project:'roofformat',priority:'medium',block:'any',date:'',note:'',tags:[],subtasks:[],done:false,objId});
  saveData();renderObjects();renderTasks();
}

// ADD FORM
function renderProjectChips(){
  document.getElementById('projectChips').innerHTML=PROJECTS.map(p=>
    `<button class="chip" style="${newProject===p.id?`background:${p.color};color:#0A0A0A;border-color:${p.color}`:''}" onclick="selectProject('${p.id}')">${p.label}</button>`
  ).join('');
}
function renderPrioChips(){
  document.getElementById('prioChips').innerHTML=PRIORITIES.map(p=>
    `<button class="prio-chip" style="${newPriority===p.id?`background:${p.color};color:#0A0A0A;border-color:${p.color}`:''}" onclick="selectPrio('${p.id}')">${p.label}</button>`
  ).join('');
}
function renderBlockChips(){
  document.getElementById('blockChips').innerHTML=BLOCKS.map(b=>
    `<button class="chip" style="${newBlock===b.id?'background:var(--gold);color:#0A0A0A;border-color:var(--gold)':''}" onclick="selectBlock('${b.id}')">${b.label}</button>`
  ).join('');
}
function renderNewTags(){
  document.getElementById('newTagsDisplay').innerHTML=newTags.map((t,i)=>
    `<span class="task-tag-chip">#${esc(t)}<button onclick="removeNewTag(${i})">×</button></span>`
  ).join('');
}

function selectProject(id){newProject=id;renderProjectChips()}
function selectPrio(id){newPriority=id;renderPrioChips()}
function selectBlock(id){newBlock=id;renderBlockChips()}
function addNewTag(){
  const inp=document.getElementById('newTagInput');
  const tag=inp.value.trim().replace(/^#/,'');
  if(tag&&!newTags.includes(tag)){newTags.push(tag)}
  inp.value='';renderNewTags();
}
function removeNewTag(i){newTags.splice(i,1);renderNewTags()}

function submitTask(){
  const title=document.getElementById('newTitle').value.trim();
  if(!title){document.getElementById('newTitle').focus();return}
  const note=document.getElementById('newNote').value.trim();
  const date=document.getElementById('newDate').value;
  tasks.unshift({id:Date.now(),title,note,tags:[...newTags],project:newProject,priority:newPriority,block:newBlock,date,subtasks:[],done:false});
  saveData();
  document.getElementById('newTitle').value='';
  document.getElementById('newNote').value='';
  document.getElementById('newDate').value='';
  newTags=[];renderNewTags();
  switchView('tasks');renderAll();
}

// ACTIONS
function toggleDone(id){
  tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);
  saveData();renderAll();
}
function deleteTask(id){
  tasks=tasks.filter(t=>t.id!==id);
  saveData();renderAll();
}
function setFilter(f){currentFilter=f;renderFilters();renderTasks()}

// VIEWS
function switchView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelector(`[data-view="${name}"]`).classList.add('active');
  if(name==='week')renderWeek();
  if(name==='objects')renderObjects();
  if(name==='add'){renderProjectChips();renderPrioChips();renderBlockChips();renderNewTags()}
}

function renderAll(){renderStats();renderFilters();renderTasks()}

// AI
async function sendChat(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();if(!text)return;
  input.value='';
  appendMsg('user',text);
  const typing=appendMsg('typing','думаю...');
  const taskSummary=tasks.length?tasks.slice(0,20).map(t=>`• [${t.project}] ${t.title} (${t.priority}${t.done?', выполнено':''})`).join('\n'):'Задач нет.';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:800,
        system:`Ты ИИ-ассистент Даниила Титова, основателя ROOFFORMAT. Помогаешь с задачами. Говори коротко. Если нужно добавить задачу — ответь ТОЛЬКО JSON: {"action":"add","title":"...","project":"roofformat|personal|stroika|content","priority":"high|medium|low","block":"morning|day|evening|any","date":"YYYY-MM-DD или пусто","note":"...","tags":[]}. Иначе — текст. Задачи:\n${taskSummary}`,
        messages:[{role:'user',content:text}]
      })
    });
    const data=await res.json();
    const reply=(data.content||[]).map(b=>b.text||'').join('');
    typing.remove();
    try{
      const json=JSON.parse(reply);
      if(json.action==='add'){
        tasks.unshift({id:Date.now(),title:json.title,project:json.project||'roofformat',priority:json.priority||'medium',block:json.block||'any',date:json.date||'',note:json.note||'',tags:json.tags||[],subtasks:[],done:false});
        saveData();renderAll();
        appendMsg('ai',`✓ Добавил: «${json.title}»`);
      }
    }catch{appendMsg('ai',reply)}
  }catch{typing.remove();appendMsg('ai','Нет соединения. Добавь задачу вручную.')}
}

function appendMsg(type,text){
  const div=document.createElement('div');
  div.className='msg '+type;div.textContent=text;
  const c=document.getElementById('chatMessages');
  c.appendChild(div);c.scrollTop=c.scrollHeight;
  return div;
}

// OFFLINE
window.addEventListener('online',()=>document.getElementById('offlineBanner').classList.remove('show'));
window.addEventListener('offline',()=>document.getElementById('offlineBanner').classList.add('show'));
if(!navigator.onLine)document.getElementById('offlineBanner').classList.add('show');

if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});

loadData();renderAll();
</script>
