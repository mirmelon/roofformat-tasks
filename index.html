<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Задачник">
<meta name="theme-color" content="#0A0A0A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ROOFFORMAT — Задачник</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;--bg2:#141414;--bg3:#1A1A1A;--bg4:#202020;
  --border:#222;--border2:#2A2A2A;
  --text:#E8E0D0;--muted:#555;--muted2:#888;
  --gold:#C8A96E;--green:#7EB8A4;--purple:#A07EB8;--red:#E07E7E;--blue:#7EA8C8;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --mono:'Space Mono',monospace;
  --serif:'Crimson Pro',Georgia,serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--serif);min-height:100vh;max-width:430px;margin:0 auto;display:flex;flex-direction:column;padding-top:var(--safe-top)}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}

.header{padding:18px 20px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-end}
.hbrand{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--gold);margin-bottom:3px}
.htitle{font-size:22px;font-weight:300;letter-spacing:-.02em}
.hstats{text-align:right;font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.9}
.htoday{color:var(--gold)}

.nav{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:11px 13px;background:none;border:none;color:var(--muted);font-size:10px;letter-spacing:.07em;font-family:var(--mono);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

.view{display:none;flex:1;flex-direction:column;overflow:hidden}
.view.active{display:flex}

.filters{display:flex;gap:7px;padding:11px 16px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fbtn{white-space:nowrap;padding:5px 13px;border-radius:20px;background:var(--bg3);color:var(--muted);border:1px solid var(--border2);font-size:10px;font-family:var(--mono);transition:all .15s}
.fbtn.active{background:var(--gold);color:var(--bg);border-color:var(--gold)}

.task-list{flex:1;overflow-y:auto;padding:0 16px 80px}
.empty{text-align:center;color:#2A2A2A;padding:60px 0;font-size:15px;font-style:italic}

.task-item{padding:13px 0;border-bottom:1px solid #111;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.task-row{display:flex;gap:11px;align-items:flex-start}

.check{width:22px;height:22px;border-radius:50%;flex-shrink:0;margin-top:2px;border:1.5px solid var(--border2);background:none;display:flex;align-items:center;justify-content:center;transition:all .2s}
.check.done{background:var(--gold);border-color:var(--gold)}
.check.done::after{content:'✓';color:var(--bg);font-size:11px;font-weight:700}

.task-body{flex:1;min-width:0}
.task-title{font-size:15px;line-height:1.4;color:var(--text)}
.task-title.done{color:#333;text-decoration:line-through}
.task-meta{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;align-items:center}
.tag{font-size:10px;font-family:var(--mono)}
.task-del{background:none;border:none;color:#2A2A2A;font-size:18px;padding:0 4px;flex-shrink:0;transition:color .15s}

.add-form{padding:20px;display:flex;flex-direction:column;gap:18px;overflow-y:auto;padding-bottom:calc(20px + var(--safe-bottom))}
.flabel{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.12em;display:block;margin-bottom:7px}
textarea,input[type=date],input[type=text],input[type=tel]{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:11px 13px;font-size:15px;font-family:var(--serif);outline:none;transition:border-color .2s;-webkit-appearance:none}
textarea:focus,input:focus{border-color:var(--gold)}
textarea{resize:none}
select{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:11px 13px;font-size:15px;font-family:var(--serif);outline:none;-webkit-appearance:none;appearance:none}
.chip-row{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:20px;background:var(--bg3);color:var(--muted);border:1px solid var(--border2);font-size:11px;font-family:var(--mono);transition:all .15s}
.prio-row{display:flex;gap:8px}
.prio-chip{flex:1;padding:8px 4px;border-radius:10px;background:var(--bg3);color:var(--muted);border:1px solid var(--border2);font-size:10px;font-family:var(--mono);text-align:center;transition:all .15s}
.btn-add{background:var(--gold);border:none;border-radius:12px;padding:14px;color:var(--bg);font-size:13px;font-weight:700;font-family:var(--mono);letter-spacing:.06em;transition:opacity .15s}
.btn-add:active{opacity:.8}

/* OBJECTS */
.obj-list{flex:1;overflow-y:auto;padding:12px 16px 80px}
.obj-card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:10px;animation:fadeIn .2s ease}
.obj-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.obj-name{font-size:16px;font-weight:400}
.obj-status{font-size:10px;font-family:var(--mono);padding:3px 9px;border-radius:10px}
.obj-meta{font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:8px}
.obj-progress{height:3px;background:var(--border2);border-radius:2px;margin-bottom:10px}
.obj-progress-bar{height:100%;border-radius:2px;background:var(--gold);transition:width .3s}
.obj-actions{display:flex;gap:8px}
.obj-btn{flex:1;padding:7px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--muted2);font-size:10px;font-family:var(--mono)}
.add-obj-form{padding:16px;border-top:1px solid var(--border)}

/* WEEK */
.week-header{display:flex;padding:10px 16px;gap:4px;border-bottom:1px solid var(--border)}
.week-day{flex:1;text-align:center;font-family:var(--mono);font-size:9px;color:var(--muted);padding:5px 2px;border-radius:8px;cursor:pointer;transition:all .15s}
.week-day.today{color:var(--gold)}
.week-day.selected{background:var(--gold);color:var(--bg)}
.week-day .day-num{font-size:16px;font-weight:300;display:block;margin-bottom:1px}
.week-day .day-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);margin:2px auto 0;opacity:0}
.week-day .day-dot.has{opacity:1}
.time-blocks{flex:1;overflow-y:auto;padding:12px 16px 80px}
.time-block{margin-bottom:16px}
.block-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.block-task{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid #111}
.block-empty{font-size:13px;color:#2A2A2A;font-style:italic;padding:8px 0}

/* TEAM */
.team-list{flex:1;overflow-y:auto;padding:12px 16px 80px}
.team-search{padding:12px 16px 0;display:flex;gap:8px}
.team-search input{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:9px 13px;font-size:14px;font-family:var(--serif);outline:none}
.team-search input:focus{border-color:var(--gold)}

.master-card{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:16px;margin-bottom:12px;animation:fadeIn .2s ease;cursor:pointer;transition:border-color .2s}
.master-card:hover{border-color:var(--gold)}
.master-card-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.master-avatar{width:52px;height:52px;border-radius:50%;background:var(--bg3);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;font-family:var(--mono);color:var(--gold)}
.master-avatar.active-av{border-color:var(--gold)}
.master-info{flex:1;min-width:0}
.master-name{font-size:17px;font-weight:400;margin-bottom:3px}
.master-role{font-size:11px;font-family:var(--mono);color:var(--gold);letter-spacing:.06em;margin-bottom:5px}
.master-status-badge{display:inline-block;font-size:9px;font-family:var(--mono);padding:2px 8px;border-radius:10px}

.master-bio{font-size:13px;color:var(--muted2);line-height:1.6;margin-bottom:12px;font-style:italic}

.master-skills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.skill-tag{font-size:10px;font-family:var(--mono);color:var(--green);border:1px solid #1E3A30;border-radius:10px;padding:3px 9px;background:#0E1F1A}

.master-section{margin-bottom:10px}
.master-section-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.12em;margin-bottom:5px}
.master-section-text{font-size:13px;color:var(--text);line-height:1.5}

.master-goal{background:var(--bg3);border-left:3px solid var(--gold);padding:10px 12px;border-radius:0 8px 8px 0;font-size:13px;font-style:italic;color:var(--text);line-height:1.5;margin-bottom:12px}

.master-stats{display:flex;gap:8px;margin-bottom:12px}
.master-stat{flex:1;background:var(--bg3);border-radius:8px;padding:8px;text-align:center}
.master-stat-val{font-family:var(--mono);font-size:16px;color:var(--gold);display:block}
.master-stat-label{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;display:block}

.master-actions{display:flex;gap:8px}
.master-btn{flex:1;padding:9px;border-radius:9px;background:var(--bg3);border:1px solid var(--border2);color:var(--muted2);font-size:10px;font-family:var(--mono);transition:all .15s}
.master-btn.primary{background:var(--gold);color:var(--bg);border-color:var(--gold)}
.master-btn:active{opacity:.8}

.add-master-btn{position:fixed;bottom:calc(20px + var(--safe-bottom));right:20px;width:52px;height:52px;border-radius:50%;background:var(--gold);border:none;color:var(--bg);font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(200,169,110,.4);z-index:50}

/* AI CHAT */
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:86%;padding:11px 14px;font-size:14px;line-height:1.5;font-family:var(--serif);animation:fadeIn .2s ease}
.msg.user{align-self:flex-end;background:var(--gold);color:var(--bg);border-radius:16px 16px 4px 16px}
.msg.ai{align-self:flex-start;background:var(--bg3);color:var(--text);border-radius:16px 16px 16px 4px}
.msg.typing{color:var(--gold);font-style:italic;font-size:13px;align-self:flex-start}
.chat-input-row{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;padding-bottom:calc(12px + var(--safe-bottom))}
.chat-input{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:10px 13px;font-size:14px;font-family:var(--serif);outline:none;transition:border-color .2s}
.chat-input:focus{border-color:var(--gold)}
.chat-send{background:var(--gold);border:none;border-radius:10px;padding:10px 16px;color:var(--bg);font-size:16px}

.offline-banner{background:#2A1A0A;border-bottom:1px solid #4A3010;padding:7px 16px;font-size:10px;font-family:var(--mono);color:var(--gold);text-align:center;display:none}
.offline-banner.show{display:block}
.nav-safe{height:var(--safe-bottom);background:var(--bg)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:calc(20px + var(--safe-bottom))}
.modal-title{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:.1em;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;color:var(--muted);font-size:22px;margin-top:-4px}

.sub-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:6px 10px;font-size:13px;font-family:var(--serif);outline:none}
.sub-add-btn{background:var(--border2);border:none;border-radius:6px;color:var(--gold);padding:6px 10px;font-size:13px}
.add-sub-row{display:flex;gap:6px;margin-top:6px}
.subtask-list{margin-bottom:8px}
.subtask-item{display:flex;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid #1A1A1A}
.sub-check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border2);background:none;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.sub-check.done{background:var(--gold);border-color:var(--gold)}
.sub-check.done::after{content:'✓';color:var(--bg);font-size:8px;font-weight:700}
.sub-title{flex:1;font-size:13px;color:var(--muted2)}
.sub-title.done{text-decoration:line-through;color:#333}
.sub-del{background:none;border:none;color:#2A2A2A;font-size:14px;padding:0 3px}
.task-note{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:8px 10px;font-size:13px;font-family:var(--serif);outline:none;resize:none;margin-top:6px}
.task-tag-chip{font-size:10px;font-family:var(--mono);color:var(--blue);border:1px solid var(--blue);border-radius:12px;padding:2px 8px;display:inline-flex;align-items:center;gap:4px}
.task-tag-chip button{background:none;border:none;color:var(--blue);font-size:11px;padding:0}
.tag-inp{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:5px 9px;font-size:12px;font-family:var(--mono);outline:none;width:100px}
</style>
</head>
<body>
<div class="offline-banner" id="offlineBanner">⚡ Офлайн — данные сохранены</div>

<div class="header">
  <div>
    <div class="hbrand">ROOFFORMAT</div>
    <div class="htitle">Задачник</div>
  </div>
  <div class="hstats">
    <div class="htoday" id="statToday"></div>
    <div id="statActive"></div>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" data-view="tasks" onclick="switchView('tasks')">ЗАДАЧИ</button>
  <button class="nav-btn" data-view="week" onclick="switchView('week')">НЕДЕЛЯ</button>
  <button class="nav-btn" data-view="objects" onclick="switchView('objects')">ОБЪЕКТЫ</button>
  <button class="nav-btn" onclick="window.location.href='masters.html'">КОМАНДА</button>
  <button class="nav-btn" data-view="team" onclick="switchView('team')">КОМАНДА</button>
  <button class="nav-btn" data-view="add" onclick="switchView('add')">+ ЗАДАЧА</button>
  <button class="nav-btn" data-view="ai" onclick="switchView('ai')">ИИ</button>
</nav>

<!-- TASKS -->
<div class="view active" id="view-tasks">
  <div class="filters" id="filters"></div>
  <div class="task-list" id="taskList"></div>
</div>

<!-- WEEK -->
<div class="view" id="view-week">
  <div class="week-header" id="weekHeader"></div>
  <div class="time-blocks" id="timeBlocks"></div>
</div>

<!-- OBJECTS -->
<div class="view" id="view-objects">
  <div class="obj-list" id="objList"></div>
  <div class="add-obj-form">
    <div style="display:flex;gap:8px">
      <input type="text" id="newObjName" placeholder="Название объекта..." style="flex:1;font-size:14px;padding:10px 13px">
      <button class="btn-add" style="padding:10px 16px;border-radius:10px;flex-shrink:0" onclick="addObject()">+</button>
    </div>
  </div>
</div>

<!-- TEAM -->
<div class="view" id="view-team">
  <div class="team-search">
    <input type="text" id="teamSearch" placeholder="Поиск по имени или навыку..." oninput="renderTeam()">
  </div>
  <div style="display:flex;gap:7px;padding:10px 16px;overflow-x:auto;scrollbar-width:none" id="teamFilters"></div>
  <div class="team-list" id="teamList"></div>
  <button class="add-master-btn" onclick="openMasterForm()">+</button>
</div>

<!-- ADD TASK -->
<div class="view" id="view-add">
  <div class="add-form">
    <div>
      <label class="flabel">ЗАДАЧА</label>
      <textarea id="newTitle" rows="3" placeholder="Что нужно сделать?"></textarea>
    </div>
    <div>
      <label class="flabel">ЗАМЕТКА</label>
      <textarea id="newNote" rows="2" placeholder="Дополнительная информация..."></textarea>
    </div>
    <div>
      <label class="flabel">ПРОЕКТ</label>
      <div class="chip-row" id="projectChips"></div>
    </div>
    <div>
      <label class="flabel">ПРИОРИТЕТ</label>
      <div class="prio-row" id="prioChips"></div>
    </div>
    <div>
      <label class="flabel">БЛОК ДНЯ</label>
      <div class="chip-row" id="blockChips"></div>
    </div>
    <div>
      <label class="flabel">ДАТА</label>
      <input type="date" id="newDate">
    </div>
    <button class="btn-add" onclick="submitTask()">ДОБАВИТЬ ЗАДАЧУ</button>
  </div>
</div>

<!-- AI -->
<div class="view" id="view-ai">
  <div class="chat-messages" id="chatMessages">
    <div class="msg ai">Привет, Даниил. Пиши задачи или вопросы — помогу с планированием и приоритетами.</div>
  </div>
  <div class="chat-input-row">
    <input class="chat-input" id="chatInput" type="text" placeholder="Напиши задачу или вопрос..." onkeydown="if(event.key==='Enter')sendChat()">
    <button class="chat-send" onclick="sendChat()">→</button>
  </div>
</div>

<div class="nav-safe"></div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="taskModal" onclick="if(event.target===this)closeModal('taskModal')">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="modal-title">ЗАДАЧА</div>
      <button class="modal-close" onclick="closeModal('taskModal')">×</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<!-- MASTER FORM MODAL -->
<div class="modal-overlay" id="masterModal" onclick="if(event.target===this)closeModal('masterModal')">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="modal-title" id="masterModalTitle">НОВЫЙ МАСТЕР</div>
      <button class="modal-close" onclick="closeModal('masterModal')">×</button>
    </div>
    <div id="masterFormContent"></div>
  </div>
</div>

<!-- MASTER VIEW MODAL -->
<div class="modal-overlay" id="masterViewModal" onclick="if(event.target===this)closeModal('masterViewModal')">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="modal-title">МАСТЕР</div>
      <button class="modal-close" onclick="closeModal('masterViewModal')">×</button>
    </div>
    <div id="masterViewContent"></div>
  </div>
</div>

<script>
const TASKS_KEY='rf_tasks';
const OBJ_KEY='rf_objects';
const TEAM_KEY='rf_team';

const PROJECTS=[
  {id:'roofformat',label:'ROOFFORMAT',color:'#C8A96E'},
  {id:'personal',label:'Личное',color:'#7EB8A4'},
  {id:'stroika',label:'Стройка',color:'#A07EB8'},
  {id:'content',label:'Контент',color:'#E07E7E'},
];
const PRIORITIES=[
  {id:'high',label:'Важно',color:'#E07E7E'},
  {id:'medium',label:'Средне',color:'#C8A96E'},
  {id:'low',label:'Спокойно',color:'#7EB8A4'},
];
const BLOCKS=[
  {id:'morning',label:'☀️ Утро'},
  {id:'day',label:'🌤 День'},
  {id:'evening',label:'🌙 Вечер'},
  {id:'any',label:'📌 Любое'},
];
const OBJ_STATUSES=[
  {id:'active',label:'В работе',color:'#C8A96E'},
  {id:'design',label:'Проект',color:'#7EA8C8'},
  {id:'done',label:'Сдан',color:'#7EB8A4'},
  {id:'paused',label:'Пауза',color:'#555'},
];
const MASTER_STATUSES=[
  {id:'active',label:'В команде',color:'#7EB8A4'},
  {id:'project',label:'На объекте',color:'#C8A96E'},
  {id:'free',label:'Свободен',color:'#7EA8C8'},
  {id:'inactive',label:'Не активен',color:'#555'},
];
const MASTER_ROLES=[
  'Кровельщик','Старший мастер','Бригадир','Проектировщик',
  'Монтажник фальца','Специалист по черепице','Плотник','Производство','Менеджер'
];
const SKILL_OPTIONS=[
  'Фальцевая кровля','Натуральная черепица','Мягкая кровля','Плоская кровля',
  'SIP-технологии','3D-визуализация','Проектирование','Плотницкие работы',
  'Металлообработка','Узлы и примыкания','Водосток','Утепление',
  'Работа с чертежами','Префаб','Производство элементов'
];

const GOAL_PRESETS=[
  'Стать мастером фальцевой кровли',
  'Развить навыки проектирования',
  'Вырасти до бригадира',
  'Освоить 3D-визуализацию',
  'Построить карьеру в ROOFFORMAT',
  'Развить производственное направление',
  'Стать специалистом по сложным объектам',
];

let tasks=[], objects=[], team=[];
let currentFilter='all', selectedWeekDay=null;
let newProject='roofformat', newPriority='medium', newBlock='any';
let editingMasterId=null, teamFilterStatus='all';

function loadData(){
  try{tasks=JSON.parse(localStorage.getItem(TASKS_KEY)||'[]')}catch{tasks=[]}
  try{objects=JSON.parse(localStorage.getItem(OBJ_KEY)||'[]')}catch{objects=[]}
  try{team=JSON.parse(localStorage.getItem(TEAM_KEY)||'[]')}catch{team=[]}
}
function saveData(){
  localStorage.setItem(TASKS_KEY,JSON.stringify(tasks));
  localStorage.setItem(OBJ_KEY,JSON.stringify(objects));
  localStorage.setItem(TEAM_KEY,JSON.stringify(team));
}

function fmtDate(s){if(!s)return'';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function today(){return new Date().toISOString().split('T')[0]}
function getWeekDays(){const d=new Date();d.setHours(0,0,0,0);const mon=new Date(d);mon.setDate(d.getDate()-((d.getDay()+6)%7));return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x})}
const DAY_NAMES=['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];

// STATS
function renderStats(){
  const t=today();
  const todayN=tasks.filter(x=>x.date===t&&!x.done).length;
  const active=tasks.filter(x=>!x.done).length;
  document.getElementById('statToday').textContent=todayN>0?todayN+' на сегодня':'';
  document.getElementById('statActive').textContent=active+' активных';
}

// TASKS
function renderFilters(){
  const all=[{id:'all',label:'Все'},{id:'done',label:'Готово'},...PROJECTS.map(p=>({id:p.id,label:p.label}))];
  document.getElementById('filters').innerHTML=all.map(f=>`<button class="fbtn${currentFilter===f.id?' active':''}" onclick="setFilter('${f.id}')">${f.label}</button>`).join('');
}
function renderTasks(){
  const filtered=tasks.filter(t=>{
    if(currentFilter==='all')return!t.done;
    if(currentFilter==='done')return t.done;
    return t.project===currentFilter&&!t.done;
  });
  if(!filtered.length){document.getElementById('taskList').innerHTML=`<div class="empty">${currentFilter==='done'?'Ещё ничего не выполнено':'Задач нет — добавь первую'}</div>`;return}
  document.getElementById('taskList').innerHTML=filtered.map(t=>{
    const proj=PROJECTS.find(p=>p.id===t.project);
    const prio=PRIORITIES.find(p=>p.id===t.priority);
    const subDone=(t.subtasks||[]).filter(s=>s.done).length;
    const subTotal=(t.subtasks||[]).length;
    const noteP=t.note?`<div style="font-size:12px;color:var(--muted);margin-top:4px;font-style:italic">${esc(t.note.substring(0,60))}${t.note.length>60?'…':''}</div>`:'';
    return`<div class="task-item">
      <div class="task-row">
        <button class="check${t.done?' done':''}" onclick="toggleDone(${t.id})"></button>
        <div class="task-body" onclick="openTask(${t.id})" style="cursor:pointer">
          <div class="task-title${t.done?' done':''}">${esc(t.title)}</div>
          ${noteP}
          <div class="task-meta">
            ${proj?`<span class="tag" style="color:${proj.color}">${proj.label}</span>`:''}
            ${prio?`<span class="tag" style="color:${prio.color}">${prio.label}</span>`:''}
            ${t.date?`<span class="tag" style="color:var(--muted)">${fmtDate(t.date)}</span>`:''}
            ${subTotal?`<span class="tag" style="color:var(--muted)">${subDone}/${subTotal}</span>`:''}
          </div>
        </div>
        <button class="task-del" onclick="deleteTask(${t.id})">×</button>
      </div>
    </div>`;
  }).join('');
}

function openTask(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  document.getElementById('modalContent').innerHTML=`
    <div style="font-size:18px;margin-bottom:12px">${esc(t.title)}</div>
    <div class="flabel">ЗАМЕТКА</div>
    <textarea class="task-note" rows="3" id="modalNote" onchange="saveNote(${id})">${esc(t.note||'')}</textarea>
    <div class="flabel" style="margin-top:14px">ПОДЗАДАЧИ</div>
    <div class="subtask-list" id="subtaskList">${renderSubs(t)}</div>
    <div class="add-sub-row">
      <input class="sub-input" id="subInput" placeholder="Новая подзадача..." onkeydown="if(event.key==='Enter')addSub(${id})">
      <button class="sub-add-btn" onclick="addSub(${id})">+</button>
    </div>`;
  document.getElementById('taskModal').classList.add('open');
}
function renderSubs(t){return(t.subtasks||[]).map((s,i)=>`<div class="subtask-item"><button class="sub-check${s.done?' done':''}" onclick="toggleSub(${t.id},${i})"></button><span class="sub-title${s.done?' done':''}">${esc(s.title)}</span><button class="sub-del" onclick="deleteSub(${t.id},${i})">×</button></div>`).join('')||'<div style="font-size:12px;color:#333;font-style:italic;padding:4px 0">Нет подзадач</div>'}
function saveNote(id){tasks=tasks.map(t=>t.id===id?{...t,note:document.getElementById('modalNote').value}:t);saveData();renderTasks()}
function addSub(id){const inp=document.getElementById('subInput');const title=inp.value.trim();if(!title)return;tasks=tasks.map(t=>t.id!==id?t:{...t,subtasks:[...(t.subtasks||[]),{title,done:false}]});inp.value='';saveData();const t=tasks.find(x=>x.id===id);document.getElementById('subtaskList').innerHTML=renderSubs(t);renderTasks()}
function toggleSub(tid,i){tasks=tasks.map(t=>{if(t.id!==tid)return t;const s=[...(t.subtasks||[])];s[i]={...s[i],done:!s[i].done};return{...t,subtasks:s}});saveData();const t=tasks.find(x=>x.id===tid);document.getElementById('subtaskList').innerHTML=renderSubs(t);renderTasks()}
function deleteSub(tid,i){tasks=tasks.map(t=>{if(t.id!==tid)return t;const s=[...(t.subtasks||[])];s.splice(i,1);return{...t,subtasks:s}});saveData();const t=tasks.find(x=>x.id===tid);document.getElementById('subtaskList').innerHTML=renderSubs(t);renderTasks()}

function toggleDone(id){tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);saveData();renderAll()}
function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);saveData();renderAll()}
function setFilter(f){currentFilter=f;renderFilters();renderTasks()}

// WEEK
function renderWeek(){
  const days=getWeekDays();const sel=selectedWeekDay||today();
  document.getElementById('weekHeader').innerHTML=days.map((d,i)=>{
    const ds=d.toISOString().split('T')[0];
    const has=tasks.some(t=>t.date===ds&&!t.done);
    return`<div class="week-day${ds===today()?' today':''}${ds===sel?' selected':''}" onclick="selectDay('${ds}')"><span style="font-size:9px">${DAY_NAMES[i]}</span><span class="day-num">${d.getDate()}</span><div class="day-dot${has?' has':''}"></div></div>`;
  }).join('');
  const dayT=tasks.filter(t=>t.date===sel&&!t.done);
  const noDate=tasks.filter(t=>!t.date&&!t.done);
  document.getElementById('timeBlocks').innerHTML=['morning','day','evening','any'].map(bid=>{
    const bl=BLOCKS.find(b=>b.id===bid);
    const bt=bid==='any'?[...dayT.filter(t=>!t.block||t.block==='any'),...(sel===today()?noDate:[])] :dayT.filter(t=>t.block===bid);
    return`<div class="time-block"><div class="block-label">${bl.label}</div>${bt.length?bt.map(t=>`<div class="block-task"><button class="check${t.done?' done':''}" onclick="toggleDone(${t.id});renderWeek()" style="width:18px;height:18px;flex-shrink:0;margin-top:2px"></button><div style="flex:1;font-size:14px;cursor:pointer" onclick="openTask(${t.id})">${esc(t.title)}</div></div>`).join(''):`<div class="block-empty">Нет задач</div>`}</div>`;
  }).join('');
}
function selectDay(ds){selectedWeekDay=ds;renderWeek()}

// OBJECTS
function renderObjects(){
  if(!objects.length){document.getElementById('objList').innerHTML='<div class="empty">Объектов нет</div>';return}
  document.getElementById('objList').innerHTML=objects.map(o=>{
    const st=OBJ_STATUSES.find(s=>s.id===o.status)||OBJ_STATUSES[0];
    const ot=tasks.filter(t=>t.objId===o.id);
    const done=ot.filter(t=>t.done).length;const total=ot.length;
    const pct=total?Math.round(done/total*100):0;
    return`<div class="obj-card">
      <div class="obj-header"><div class="obj-name">${esc(o.name)}</div><span class="obj-status" style="background:${st.color}22;color:${st.color}">${st.label}</span></div>
      ${total?`<div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:6px">${done}/${total} задач</div><div class="obj-progress"><div class="obj-progress-bar" style="width:${pct}%"></div></div>`:''}
      <div class="obj-actions">
        <select class="obj-btn" onchange="changeObjStatus(${o.id},this.value)" style="font-family:var(--mono);font-size:10px;background:var(--bg3)">${OBJ_STATUSES.map(s=>`<option value="${s.id}"${o.status===s.id?' selected':''}>${s.label}</option>`).join('')}</select>
        <button class="obj-btn" onclick="addObjTask(${o.id})">+ задача</button>
        <button class="obj-btn" onclick="deleteObj(${o.id})" style="color:var(--red);flex:0;padding:7px 10px">×</button>
      </div>
    </div>`;
  }).join('');
}
function addObject(){const inp=document.getElementById('newObjName');const name=inp.value.trim();if(!name)return;objects.push({id:Date.now(),name,status:'active'});inp.value='';saveData();renderObjects()}
function changeObjStatus(id,s){objects=objects.map(o=>o.id===id?{...o,status:s}:o);saveData();renderObjects()}
function deleteObj(id){if(!confirm('Удалить объект?'))return;objects=objects.filter(o=>o.id!==id);saveData();renderObjects()}
function addObjTask(objId){const obj=objects.find(o=>o.id===objId);if(!obj)return;const title=prompt(`Задача для «${obj.name}»:`);if(!title||!title.trim())return;tasks.unshift({id:Date.now(),title:title.trim(),project:'roofformat',priority:'medium',block:'any',date:'',note:'',tags:[],subtasks:[],done:false,objId});saveData();renderObjects();renderTasks()}

// TEAM

function renderTeamFilters(){
  const statuses=[{id:'all',label:'Все'},...MASTER_STATUSES];
  document.getElementById('teamFilters').innerHTML=statuses.map(s=>
    `<button class="fbtn${teamFilterStatus===s.id?' active':''}" onclick="setTeamFilter('${s.id}')">${s.label}</button>`
  ).join('');
}
function setTeamFilter(s){teamFilterStatus=s;renderTeam()}

function renderTeam(){
  renderTeamFilters();
  const q=(document.getElementById('teamSearch')?.value||'').toLowerCase();
  let filtered=team.filter(m=>{
    if(teamFilterStatus!=='all'&&m.status!==teamFilterStatus)return false;
    if(q){return m.name.toLowerCase().includes(q)||(m.skills||[]).some(s=>s.toLowerCase().includes(q))||(m.role||'').toLowerCase().includes(q)}
    return true;
  });
  if(!filtered.length){
    document.getElementById('teamList').innerHTML='<div class="empty">Мастеров нет — добавь первого</div>';
    return;
  }
  document.getElementById('teamList').innerHTML=filtered.map(m=>masterCardHTML(m)).join('');
}

function masterCardHTML(m){
  const st=MASTER_STATUSES.find(s=>s.id===m.status)||MASTER_STATUSES[0];
  const initials=(m.name||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  const skills=(m.skills||[]).slice(0,4).map(s=>`<span class="skill-tag">${esc(s)}</span>`).join('');
  const moreSkills=(m.skills||[]).length>4?`<span class="skill-tag" style="color:var(--muted)">+${(m.skills||[]).length-4}</span>`:'';
  const exp=m.experience?`<span style="font-family:var(--mono);font-size:10px;color:var(--muted)">${esc(m.experience)} лет опыта</span>`:'';
  return`<div class="master-card" onclick="viewMaster(${m.id})">
    <div class="master-card-header">
      <div class="master-avatar${m.status==='active'?' active-av':''}">${initials}</div>
      <div class="master-info">
        <div class="master-name">${esc(m.name)}</div>
        <div class="master-role">${esc(m.role||'Мастер')}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="master-status-badge" style="background:${st.color}22;color:${st.color}">${st.label}</span>
          ${exp}
        </div>
      </div>
    </div>
    ${m.bio?`<div class="master-bio">${esc(m.bio.substring(0,120))}${m.bio.length>120?'…':''}</div>`:''}
    ${skills||moreSkills?`<div class="master-skills">${skills}${moreSkills}</div>`:''}
    ${m.goal?`<div class="master-goal">«${esc(m.goal.substring(0,100))}${m.goal.length>100?'…':''}»</div>`:''}
    <div class="master-actions" onclick="event.stopPropagation()">
      <button class="master-btn" onclick="editMaster(${m.id})">Редактировать</button>
      ${m.phone?`<button class="master-btn primary" onclick="window.location='tel:${esc(m.phone)}'">Позвонить</button>`:''}
    </div>
  </div>`;
}

    ${(m.skills||[]).length?`<div class="master-section"><div class="master-section-label">НАВЫКИ</div><div class="master-skills" style="margin-top:6px">${m.skills.map(s=>`<span class="skill-tag">${esc(s)}</span>`).join('')}</div></div>`:''}
    ${m.experience?`<div class="master-section"><div class="master-section-label">ОПЫТ</div><div class="master-section-text">${esc(m.experience)} лет в профессии</div></div>`:''}

    ${m.interaction?`<div class="master-section"><div class="master-section-label">ЦЕЛЬ ВЗАИМОДЕЙСТВИЯ</div><div class="master-section-text">${esc(m.interaction)}</div></div>`:''}

function selectRole(role,btn){
  window._mRole=role;
  document.querySelectorAll('#roleChips .chip').forEach(b=>{b.style.background='';b.style.color='';b.style.borderColor=''});
  btn.style.background='var(--gold)';btn.style.color='#0A0A0A';btn.style.borderColor='var(--gold)';
}
function selectMasterStatus(id){
  window._mStatus=id;
  MASTER_STATUSES.forEach(s=>{
    const b=document.getElementById('mst_'+s.id);if(!b)return;
    if(s.id===id){b.style.background=s.color;b.style.color='#0A0A0A';b.style.borderColor=s.color}
    else{b.style.background='';b.style.color='';b.style.borderColor=''}
  });
}
function toggleSkill(skill,btn){
  const idx=window._mSkills.indexOf(skill);
  if(idx>=0){window._mSkills.splice(idx,1);btn.style.background='';btn.style.color='';btn.style.borderColor=''}
  else{window._mSkills.push(skill);btn.style.background='var(--green)';btn.style.color='#0A0A0A';btn.style.borderColor='var(--green)'}
}
function setGoalPreset(g){document.getElementById('mGoal').value=g}

function saveMaster(){
  const name=document.getElementById('mName').value.trim();
  if(!name){document.getElementById('mName').focus();return}
  const master={
    id:editingMasterId||Date.now(),
    name,
    role:window._mRole||'Кровельщик',
    status:window._mStatus||'active',
    phone:document.getElementById('mPhone').value.trim(),
    experience:document.getElementById('mExp').value.trim(),
    objects:document.getElementById('mObjs').value.trim(),
    bio:document.getElementById('mBio').value.trim(),
    skills:[...(window._mSkills||[])],
    ambitions:document.getElementById('mAmb').value.trim(),
    goal:document.getElementById('mGoal').value.trim(),
    interaction:document.getElementById('mInter').value.trim(),
  };
  if(editingMasterId){team=team.map(m=>m.id===editingMasterId?master:m)}
  else{team.unshift(master)}
  saveData();closeModal('masterModal');renderTeam();
}
function editMaster(id){const m=team.find(x=>x.id===id);if(m)openMasterForm(m)}
function deleteMaster(id){if(!confirm('Удалить мастера?'))return;team=team.filter(m=>m.id!==id);saveData();closeModal('masterModal');renderTeam()}

// ADD TASK FORM
function renderProjectChips(){document.getElementById('projectChips').innerHTML=PROJECTS.map(p=>`<button class="chip" style="${newProject===p.id?`background:${p.color};color:#0A0A0A;border-color:${p.color}`:''}" onclick="selectProject('${p.id}')">${p.label}</button>`).join('')}
function renderPrioChips(){document.getElementById('prioChips').innerHTML=PRIORITIES.map(p=>`<button class="prio-chip" style="${newPriority===p.id?`background:${p.color};color:#0A0A0A;border-color:${p.color}`:''}" onclick="selectPrio('${p.id}')">${p.label}</button>`).join('')}
function renderBlockChips(){document.getElementById('blockChips').innerHTML=BLOCKS.map(b=>`<button class="chip" style="${newBlock===b.id?'background:var(--gold);color:#0A0A0A;border-color:var(--gold)':''}" onclick="selectBlock('${b.id}')">${b.label}</button>`).join('')}
function selectProject(id){newProject=id;renderProjectChips()}
function selectPrio(id){newPriority=id;renderPrioChips()}
function selectBlock(id){newBlock=id;renderBlockChips()}

function submitTask(){
  const title=document.getElementById('newTitle').value.trim();if(!title){document.getElementById('newTitle').focus();return}
  const note=document.getElementById('newNote').value.trim();
  const date=document.getElementById('newDate').value;
  tasks.unshift({id:Date.now(),title,note,project:newProject,priority:newPriority,block:newBlock,date,subtasks:[],done:false});
  saveData();
  document.getElementById('newTitle').value='';document.getElementById('newNote').value='';document.getElementById('newDate').value='';
  switchView('tasks');renderAll();
}

// VIEWS
function switchView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelector(`[data-view="${name}"]`).classList.add('active');
  if(name==='week')renderWeek();
  if(name==='objects')renderObjects();
  if(name==='team'){renderTeamFilters();renderTeam()}
  if(name==='add'){renderProjectChips();renderPrioChips();renderBlockChips()}
}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function renderAll(){renderStats();renderFilters();renderTasks()}

// AI
async function sendChat(){
  const input=document.getElementById('chatInput');const text=input.value.trim();if(!text)return;
  input.value='';appendMsg('user',text);const typing=appendMsg('typing','думаю...');
  const ts=tasks.slice(0,15).map(t=>`• ${t.title} (${t.priority}${t.done?', ✓':''})`).join('\n');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:`Ты ИИ-ассистент Даниила Титова, основателя ROOFFORMAT. Кровельная компания с философией продуманных решений. Помогаешь с задачами. Говори коротко. Если нужно добавить задачу — ТОЛЬКО JSON: {"action":"add","title":"...","project":"roofformat|personal|stroika|content","priority":"high|medium|low","block":"morning|day|evening|any","date":"YYYY-MM-DD или пусто"}. Иначе текст. Задачи:\n${ts}`,messages:[{role:'user',content:text}]})});
    const data=await res.json();const reply=(data.content||[]).map(b=>b.text||'').join('');
    typing.remove();
    try{const j=JSON.parse(reply);if(j.action==='add'){tasks.unshift({id:Date.now(),title:j.title,project:j.project||'roofformat',priority:j.priority||'medium',block:j.block||'any',date:j.date||'',note:'',subtasks:[],done:false});saveData();renderAll();appendMsg('ai',`✓ Добавил: «${j.title}»`)}}
    catch{appendMsg('ai',reply)}
  }catch{typing.remove();appendMsg('ai','Нет соединения.')}
}
function appendMsg(type,text){const div=document.createElement('div');div.className='msg '+type;div.textContent=text;const c=document.getElementById('chatMessages');c.appendChild(div);c.scrollTop=c.scrollHeight;return div}

// OFFLINE
window.addEventListener('online',()=>document.getElementById('offlineBanner').classList.remove('show'));
window.addEventListener('offline',()=>document.getElementById('offlineBanner').classList.add('show'));
if(!navigator.onLine)document.getElementById('offlineBanner').classList.add('show');
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});

loadData();renderAll();
</script>
